<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nail Spa · Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f7;
        --color-background-tertiary: #e8e8ed;
        --color-text-primary: #1d1d1f;
        --color-text-secondary: #6e6e73;
        --color-text-tertiary: #aeaeb2;
        --color-border-tertiary: #d2d2d7;
        --border-radius-sm: 6px;
        --border-radius-md: 10px;
        --border-radius-lg: 14px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1e;
          --color-background-secondary: #2c2c2e;
          --color-background-tertiary: #3a3a3c;
          --color-text-primary: #f5f5f7;
          --color-text-secondary: #aeaeb2;
          --color-text-tertiary: #636366;
          --color-border-tertiary: #3a3a3c;
        }
      }

      body {
        margin: 0;
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        min-height: 100vh;
      }

      #root {
        max-width: 960px;
        margin: 0 auto;
        padding: 0;
      }

      input, select, textarea {
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        padding: 8px 10px;
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus, select:focus { border-color: #B5606B; }

      button {
        background: var(--color-background-secondary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        padding: 7px 14px;
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.8; }

      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); border: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
